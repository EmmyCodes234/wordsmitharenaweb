<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Wordsmiths Arena | Scrabble Retreat</title>
    <meta name="description" content="Join the elite Scrabble retreat in Lagos. A premium 10-round tournament with verifiable rating systems, cash prizes, and a world-class experience. Register now." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --cream: #FFFFFF;
        --burnt-orange: #000000;
        --deep-burnt: #000000;
        --soft-orange: #F5F5F5;
        --mahogany: #1A1A1A;
        --noovo-yellow: #FFB800;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--cream);
        color: var(--deep-burnt);
        margin: 0;
        overflow-x: hidden;
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .font-display {
        font-family: 'Inter', sans-serif;
        letter-spacing: -0.04em;
      }
      .btn-orange {
        background: #000000;
        transition: all 0.3s ease;
      }
      .btn-orange:hover {
        background: #333333;
        transform: translateY(-2px);
      }
      
      /* Utilities */
      .bg-noovo-yellow {
        background-color: var(--noovo-yellow);
      }
      
      /* Animations */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes revealUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .animate-reveal {
        animation: revealUp 0.8s ease-out forwards;
      }
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }

      .nav-dot {
        width: 12px;
        height: 3px;
        background: rgba(0, 0, 0, 0.1);
        border-radius: 2px;
        transition: all 0.5s ease;
      }
      .nav-dot.active {
        background: #000000;
        width: 32px;
        height: 4px;
      }
      
      .illustrative-card {
        background: #FFFFFF;
        border: 1px solid rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        border-radius: 1rem;
      }
      .illustrative-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react-dom": "https://esm.sh/react-dom@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
